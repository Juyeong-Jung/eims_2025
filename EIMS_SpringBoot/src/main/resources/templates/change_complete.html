<!DOCTYPE html>
<!--
  更新完了ページ。
  変更後の内容を表示するのみで編集はできません。
-->
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>社員情報登録確認</title>
</head>
<body>
	<main layout:fragment="main_content">
        <h1 class="mt-5">社員情報変更完了</h1>
          <p>以下の社員情報を更新しました。</p>
        <form th:object="${employeeForm}" class="mt-3">
            <table class="table table-bordered">
                <tr>
                    <td>社員番号</td>
                    <td><p th:text="*{empno}"></p></td>
                </tr>
                <tr>
                    <td>氏</td>
                    <td><p th:text="*{lname}"></p></td>
                </tr>
                <tr>
                    <td>名</td>
                    <td><p th:text="*{fname}"></p></td>
                </tr>
                <tr>
                    <td>氏（カナ）</td>
                    <td><p th:text="*{lkana}"></p></td>
                </tr>
                <tr>
                    <td>名（カナ）</td>
                    <td><p th:text="*{fkana}"></p></td>
                </tr>
                <tr>
                    <td>性別</td>
                    <td><p th:text="*{gender == 1 ? '男性' : gender == 2 ? '女性' : '未選択'}"></p></td>
                </tr>
                <tr>
                    <td>部署名</td>
                    <td>
                        <p th:text="${department != null} ? ${department.deptname} : '未選択'"></p>
                    </td>
                </tr>
                
            </table>
            <div class = "text-center mb-5">
            	<a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
            </div>
        </form>
    </main>
</body>
</html>
