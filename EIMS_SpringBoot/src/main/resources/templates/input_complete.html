<!DOCTYPE html>
<!--
  登録完了ページ。
  登録した内容を表示し、続けて追加登録するかトップへ戻るか選択します。
-->
<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <title>社員情報登録確認</title>
</head>
<body>
	<main layout:fragment="main_content">
        <h1 class="mt-5">社員情報登録完了</h1>
          <p>以下の社員情報を登録しました。</p>
        <!-- 追加登録ボタンを押すと再び入力画面へ -->
        <form th:action="@{/input}" th:object="${employeeForm}" class="mt-3">
            <table class="table table-bordered">
                <tr>
                    <td>社員番号</td>
                    <td><p th:text="*{empno}"></p></td>
                </tr>
                <tr>
                    <td>氏</td>
                    <td><p th:text="*{lname}"></p></td>
                </tr>
                <tr>
                    <td>名</td>
                    <td><p th:text="*{fname}"></p></td>
                </tr>
                <tr>
                    <td>氏（カナ）</td>
                    <td><p th:text="*{lkana}"></p></td>
                </tr>
                <tr>
                    <td>名（カナ）</td>
                    <td><p th:text="*{fkana}"></p></td>
                </tr>
                <tr>
                    <td>性別</td>
                    <td><p th:text="*{gender == 1 ? '男性' : gender == 2 ? '女性' : '未選択'}"></p></td>
                </tr>
                <tr>
                    <td>部署名</td>
                    <td>
                        <p th:text="${department != null} ? ${department.deptname} : '未選択'"></p>
                    </td>
                </tr>
                
            </table>
            
            <div class = "text-center mb-5">
            	<button type="submit" class="btn btn-primary">追加登録</button> 
            	<a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
            </div>
        </form>
	</main>    
</body>
</html>
