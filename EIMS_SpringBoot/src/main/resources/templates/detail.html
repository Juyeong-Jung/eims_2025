<!DOCTYPE html>
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>社員詳細</title>
</head>

<body>
    <main layout:fragment="main_content">

        <h1 class="h4 mb-4">社員詳細</h1>

        <div class="container-fluid">
            <div class="row g-3">
                <!-- 左：写真＋社員番号（枠線のみ） -->
                <div class="col-12 col-md-4">
                    <div class="border p-3 text-center">
                        <img th:src="@{/images/{id}.png(id=${employee.empno})}"
                            th:alt="${employee.lname + ' ' + employee.fname}" width="160" height="190"
                            class="img-thumbnail mb-2">
                        <div class="small text-muted">
                            社員番号：<span th:text="${employee.empno}">10000</span>
                        </div>
                    </div>
                </div>

                <!-- 右：属性（枠線のみ） -->
                <div class="col-12 col-md-8">
                    <div class="border p-3">
                        <!-- 氏名（かな）を綺麗に結合 -->
                        <h2 class="h5 mb-3">
                            <span th:text="${employee.lname} + ' ' + ${employee.fname}">山田 太郎</span>
                            <span class="text-muted small ms-2"
                                th:text="'（' + ${employee.lkana} + ' ' + ${employee.fkana} + '）'">（ヤマダ タロウ）</span>
                        </h2>

                        <table class="table table-sm mb-3">
                            <tbody>
                                <tr>
                                    <th style="width: 30%;">性別</th>
                                    <td th:text="${employee.gender == 1} ? '男性' : '女性'">男性</td>
                                </tr>
                                <tr>
                                    <th>所属部署</th>
                                    <td th:text="${employee.department != null} ? ${employee.department.deptname} : ''">
                                        営業部</td>
                                </tr>
                                <tr>
                                    <th>退職者</th>
                                    <td th:text="${employee.deleteFlg == 1} ? 'はい' : 'いいえ'">いいえ</td>
                                </tr>
                                <tr>
                                    <th>管理者</th>
                                    <td th:text="${employee.role == 1} ? 'はい' : 'いいえ'">いいえ</td>
                                </tr>
                            </tbody>
                        </table>

                        <!-- 操作ボタン：管理者 or 本人 →編集可／管理者のみ →削除可 -->
                        <div class="mt-2">
                            <a class="btn btn-primary me-2"
                                th:if="${session.user != null and (session.user.role == 1 or session.user.empno == employee.empno)}"
                                th:href="@{/changeInput/}+ ${employee.empno}">
                                編集
                            </a>
                            <a class="btn btn-danger me-2" th:if="${session.user != null and session.user.role == 1}"
                                th:href="@{/deleteConfirm/}+ ${employee.empno}">
                                削除
                            </a>
                            <a class="btn btn-secondary" th:href="@{/search}">検索に戻る</a>
                        </div>
                    </div>
                </div>
            </div>
        </div>

    </main>
</body>

</html>
