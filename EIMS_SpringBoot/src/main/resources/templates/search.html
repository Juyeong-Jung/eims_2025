<!DOCTYPE html>
<!--
  社員情報を検索する画面。
  社員番号、氏名、部署名の3種類で検索できます。
-->

<html lang="ja"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
  <title>検索条件入力</title>
</head>
<body>
<main layout:fragment="main_content">

  <h1 class="h4 mb-4">検索条件入力</h1>

  <!-- 社員番号検索 -->
  <div class="mb-4">
    <h4 class="h6">社員番号検索</h4>
    <form th:action="@{/selectByEmpNo}" method="get" class="form-inline">
      <div class="form-group me-5 mb-2">
        <input type="number" name="empno" class="form-control" placeholder="社員番号">
      </div>
      <button type="submit" class="btn btn-primary mb-2">検索</button>
    </form>
  </div>

  <!-- 社員名検索 -->
  <div class="mb-4">
    <h4 class="h6">社員名検索</h4>
    <form th:action="@{/selectByEmpName}" method="get" class="form-inline">
      <div class="form-group me-5 mb-2">
        <input type="text" name="keyword" class="form-control" placeholder="姓 または 名（部分一致）">
      </div>
      <button type="submit" class="btn btn-primary mb-2">検索</button>
    </form>
  </div>

  <!-- 部署名検索 -->
  <div class="mb-4">
    <h4 class="h6">部署名検索</h4>
    <form th:action="@{/selectByDeptNo}" method="get" class="form-inline">
      <div class="form-group me-5 mb-2">
        <select name="deptno" class="form-control">
          <option th:each="dept : ${departments}"
                  th:value="${dept.deptno}"
                  th:text="${dept.deptname}">
          </option>
        </select>
      </div>
      <button type="submit" class="btn btn-primary mb-2">検索</button>
    </form>
  </div>

  <div class="mb-3">
    <a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
  </div>

</main>
</body>
</html>
