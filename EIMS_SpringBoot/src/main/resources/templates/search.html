<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <!-- Bootstrap CSSの読み込み -->
    <link href="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/css/bootstrap.min.css" rel="stylesheet">
    <title>検索条件入力</title>
</head>

<body>
    <div class="container mt-5">
        <h1 class="mb-4">検索条件入力</h1>

        <div class="mb-3">
            <h4>社員番号検索</h4>
            <form th:action="@{/selectByEmpNo}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <input type="number" name="empno" class="form-control" placeholder="社員番号">
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="mb-4">
            <h4>社員名検索</h4>
            <form th:action="@{/selectByEmpName}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <input type="text" name="keyword" class="form-control" placeholder="社員名">
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="mb-4">
            <h4>部署名検索</h4>
            <form th:action="@{/selectByDeptNo}" method="get" class="form-inline">
                <div class="form-group mr-2">
                    <select name="deptno" class="form-control">
                        <option value="100">人事部</option>
                        <option value="200">経理部</option>
                        <option value="300">営業部</option>
                        <option value="400">企画部</option>
                        <option value="500">開発部</option>
                        <option value="600">総務部</option>
                    </select>
                </div>
                <button type="submit" class="btn btn-primary">検索</button>
            </form>
        </div>

        <div class="button-group mb-3">
            <a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
        </div>
    </div>

    <!-- Bootstrap JSと依存関係の読み込み -->
    <script src="https://code.jquery.com/jquery-3.3.1.slim.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/popper.js/1.14.7/umd/popper.min.js"></script>
    <script src="https://stackpath.bootstrapcdn.com/bootstrap/4.3.1/js/bootstrap.min.js"></script>
</body>

</html>
