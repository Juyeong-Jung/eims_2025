<!DOCTYPE html>
<!--
  検索結果一覧ページ。
  検索条件に一致した社員を表形式で表示します。
-->
<html lang="ja" xmlns:th="http://www.thymeleaf.org" xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
    layout:decorate="~{layout}">

<head>
    <title>検索結果</title>
</head>

<body>
    <main layout:fragment="main_content">
        <h1>検索結果</h1>
        <div class="button-group mb-3">
            <!-- 検索画面とトップへ戻るリンク -->
            <a th:href="@{/search}" class="btn btn-success">検索画面に戻る</a>
            <a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
        </div>
        <div th:if="${employees.size() > 0}">
            <!-- 件数を表示 -->
            <h2 th:text="'検索件数：' + ${employees.size()} + '件'"></h2>
            <div class="me-5">
                <table class="table table-bordered">
                    <thead class="text-center">
                        <tr>
                            <th>顔写真</th>
                            <th>社員番号</th>
                            <th>氏名（フリガナ）</th>
                            <th>部署名</th>
                            <th>操作</th>
                        </tr>
                    </thead>
                    <tbody>
                        <!-- 検索結果を1行ずつ表示 -->
                        <tr th:each="employee : ${employees}">
                            <td class="text-center align-middle"><img th:attr="src=@{/images/} + ${employee.empno} + @{.png}, 
alt=${employee.lname} + ' ' + ${employee.fname}, width=60, height=70"> </td>
                            <td th:text="${employee.empno}" class = "align-middle"></td>
                            <td class = "align-middle">
                                <span th:text="${employee.lname} + ' ' + ${employee.fname}"></span>
                                <span th:text="'（' + ${employee.lkana} + ' ' + ${employee.fkana} + '）'"></span>
                            </td>
                           
                                                            <td th:text="${employee.department.deptname}" class = "align-middle"></td>
                            <td class="text-center align-middle">
                               <form th:action="@{'/restoreDeleteEmployee/' + ${employee.empno}}" method="post" class="d-inline">
  <button type="submit" class="btn btn-primary">復元</button>
</form>
<form th:action="@{'/physicalDeleteEmployee/' + ${employee.empno}}" method="post" class="d-inline">
  <button type="submit" class="btn btn-danger">完全削除</button>
</form>
                                
                            </td>
                            
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>
        <div th:if="${employees.size() == 0}">
            <h2>該当する社員は存在しませんでした。</h2>
        </div>
        <div class="button-group mb-3">
            <a th:href="@{/search}" class="btn btn-success">検索画面に戻る</a>
            <a th:href="@{/}" class="btn btn-secondary">トップページに戻る</a>
        </div>
    </main>
</body>

</html>
