<!DOCTYPE html>
<!--
  トップページ（ログアウト・ようこそ表示付き）
-->
<html lang="ja" xmlns:th="http://www.thymeleaf.org">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>EIMS Web トップページ</title>
  <!-- Bootstrap CSS -->
  <link rel="stylesheet" th:href="@{/css/bootstrap.min.css}" />
  <style>
    .list-group-item { color:#007bff; text-decoration:none; }
    .list-group-item:hover { text-decoration:underline; }
  </style>
</head>
<body>
  <!-- ヘッダー：ようこそ表示＋ログアウト -->
  <nav class="navbar navbar-light bg-light border-bottom">
    <div class="container">
      <span class="navbar-brand mb-0 h1">EIMS</span>
      <div class="d-flex align-items-center">
        <!-- ログイン時の表示 -->
        <span class="me-3" th:if="${session.user != null}">
          ようこそ、<strong th:text="${session.user.lname + ' ' + session.user.fname}">山田 太郎</strong> さん
        </span>
        <a class="btn btn-outline-secondary btn-sm"
           th:if="${session.user != null}"
           th:href="@{/logout}">ログアウト</a>

        <!-- 未ログイン時の表示（任意） -->
        <a class="btn btn-primary btn-sm"
           th:if="${session.user == null}"
           th:href="@{/login}">ログイン</a>
      </div>
    </div>
  </nav>

  <div class="container mt-5">
    <h1 class="mb-4">EIMS Web トップページ</h1>
    <h2 class="mb-3">メニュー</h2>
    <div class="list-group">
      <h3><a th:href="@{/search}" class="list-group-item list-group-item-action">■社員情報検索</a></h3>
      <h3><a th:href="@{/input}"  class="list-group-item list-group-item-action">■社員情報登録</a></h3>
    </div>
  </div>

  <!-- Bootstrap JS -->
  <script th:src="@{/js/bootstrap.bundle.min.js}"></script>
</body>
</html>
